name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vectorify_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Prisma
        run: npx prisma generate --schema src/prisma/schema.prisma

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/vectorify_test
          JWT_SECRET: test-jwt-secret-min-32-chars-long-123456789
          GEMINI_API_KEY: test-groq-key-for-ci
          RESEND_API_KEY: test-resend-key-for-ci
          NODE_ENV: test
        run: npm test

      - name: Build
        run: npm run build
